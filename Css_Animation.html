<html>
    <head>
        <title>CSS Animation</title>
    </head>
    <style>
        .animi{
            background-color: red;
            width: 100px;
            height: 100px;
            animation-duration: 5s;
            animation-iteration-count: infinite;
            position: relative;
        }
        @keyframes sample{
            /*from{
                background-color: yellow;
            }
            to{
                background-color: blue;
            } */
            /*0%{ background-color: rgb(255, 0, 0);}
             20%{ background-color: rgb(255, 255, 0)};
             30%{ background-color: rgb(0, 255, 0);}
             40%{ background-color: rgb(0, 255, 255)};
             50%{ background-color: rgb(0, 0, 255)};
             60%{ background-color: rgb(255, 0, 255)};
             70%{ background-color: rgb(255, 0, 0)};
             80%{ background-color: rgb(255, 255, 0);}*/
             0%{background-color: blueviolet;left:0px; top:0px;}
                25%{background-color: darkorange; left:200px; top:0px;}
                50%{background-color: darkgreen; left:200px; top:200px;}
                75%{background-color:darkblue(5 255); left:0px; top:200px;}
                  

             }

        
    </style>
    <body>
        <h1>CSS Animation</h1>
        <div class="animi" style="animation-name: sample;"></div>
    </body>
</html>
