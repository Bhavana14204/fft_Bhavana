<htmle>
    <head>
        <title>CSS GRID</title>
        <style>
            h1{
                text-align: center;

            }
            .parent{
                width: 100%;
                height: 200px;
                padding: 50px;
                gap: 10px;
                background-color: rgb(73, 234, 156);
                display: grid;
                grid-template-columns:10% 20% 50% 5%;
                
            }
                div{
                    background-color: red;
                    color: white;
                }
            
        </style>
    </head>
    <body>
        <h1>CSS GRID</h1>
        <div class='parent'>
            <div>child1</div>
            <div>child2</div>
            <div>child3</div>
            <div>child4</div>
        </div>
    </body>
</htmle>
