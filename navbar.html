<html>
    <head>
        <title>Nav Bar</title>
        <style>
            .nav{
                background-color: aqua;
                padding:10px;
                
            }
            .nav,ul{
                display:flex;
                gap:50px;
                justify-content: flex-end;
            }
            li{
                list-style-type: none;
            }
            img{
                width:500px;
                height:100px;
                margin-right:150px;

            }
            input{
                height: 30px;
                margin-top: 10px;
            }
            button{
                height: 30px;
                margin-top: 10px;
                margin-right:50px;
            }
            button:hover{
                background-color: red(154,13,126);
                color:white;
                cursor: pointer;
            }

        </style>
</head>
<body>
    <h1>NavBar</h1>
    <div Class="nav">
        <img src="logo.png" alt="">
        <input type="search">
        <button>Search</button>
        <ul>

            <li><a href="https://www.alliance.edu.in/">Home</a></li>
            <li><a href="https://www.alliance.edu.in/careers">Career</a></li>
            <li><a href="https://www.alliance.edu.in/placements/career-advancement-networking">placements</a></li>
            <li><a href="https://www.alliance.edu.in/about-us/about-us">About us</a></li>
        </ul>
    </div>
</body>

</html>
